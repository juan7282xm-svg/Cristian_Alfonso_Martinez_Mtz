<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="250" fill="url(#grad2)"/>
  
  <!-- Título -->
  <text x="200" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="white">
    Modelo V
  </text>
  
  <!-- Descenso -->
  <line x1="80" y1="80" x2="150" y2="140" stroke="white" stroke-width="3"/>
  <circle cx="80" cy="80" r="8" fill="white"/>
  <text x="80" y="65" font-size="12" text-anchor="middle" fill="white">Requisitos</text>
  
  <line x1="150" y1="140" x2="200" y2="150" stroke="white" stroke-width="3"/>
  <circle cx="150" cy="140" r="8" fill="white"/>
  <text x="150" y="160" font-size="12" text-anchor="middle" fill="white">Diseño</text>
  
  <!-- Ascenso -->
  <line x1="200" y1="150" x2="250" y2="140" stroke="white" stroke-width="3"/>
  <circle cx="200" cy="150" r="8" fill="white"/>
  <text x="200" y="175" font-size="12" text-anchor="middle" fill="white">Código</text>
  
  <line x1="250" y1="140" x2="320" y2="80" stroke="white" stroke-width="3"/>
  <circle cx="250" cy="140" r="8" fill="white"/>
  <text x="250" y="160" font-size="12" text-anchor="middle" fill="white">Pruebas</text>
  
  <circle cx="320" cy="80" r="8" fill="white"/>
  <text x="320" y="65" font-size="12" text-anchor="middle" fill="white">Release</text>
</svg>
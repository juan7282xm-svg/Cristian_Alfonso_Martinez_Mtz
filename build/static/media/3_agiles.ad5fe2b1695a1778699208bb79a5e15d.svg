<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="400" height="250" fill="url(#grad3)"/>
  
  <!-- Título -->
  <text x="200" y="40" font-size="28" font-weight="bold" text-anchor="middle" fill="white">
    Metodologías Ágiles
  </text>
  
  <!-- Ciclos iterativos -->
  <circle cx="100" cy="120" r="40" fill="white" stroke="#333" stroke-width="2"/>
  <text x="100" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Sprint 1</text>
  
  <circle cx="200" cy="120" r="40" fill="white" stroke="#333" stroke-width="2"/>
  <text x="200" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Sprint 2</text>
  
  <circle cx="300" cy="120" r="40" fill="white" stroke="#333" stroke-width="2"/>
  <text x="300" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#333">Sprint N</text>
  
  <!-- Flechas entre sprints -->
  <path d="M 140 100 L 160 100" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 240 100 L 260 100" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Feedback -->
  <text x="200" y="200" font-size="12" text-anchor="middle" fill="white">Feedback continuo</text>
  <text x="200" y="220" font-size="12" text-anchor="middle" fill="white">Entregas incrementales</text>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="white" />
    </marker>
  </defs>
</svg>